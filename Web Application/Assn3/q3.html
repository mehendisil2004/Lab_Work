<!DOCTYPE html>
<html>
<head>
    <title>Class Time Table</title>
    <style>
        table { width: 80%; margin: 20px auto; border-collapse: collapse; text-align: center; }
        th { background-color: #4CAF50; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 10px; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">Weekly Class Time Table</h2>
    <table>
        <tr>
            <th>Day / Period</th>
            <th>09:00 - 10:00</th>
            <th>10:00 - 11:00</th>
            <th>11:00 - 12:00</th>
            <th>12:00 - 01:00</th>
        </tr>
        <tr>
            <th>Monday</th>
            <td>Web Tech</td>
            <td>Database</td>
            <td rowspan="4" style="background-color: #ffe0b2;">LUNCH</td>
            <td>Networks</td>
        </tr>
        <tr>
            <th>Tuesday</th>
            <td>Java</td>
            <td>Web Tech</td>
            <td>Maths</td>
        </tr>
        <tr>
            <th>Wednesday</th>
            <td>Networks</td>
            <td>Lab</td>
            <td>Lab</td>
        </tr>
    </table>
</body>
</html>
