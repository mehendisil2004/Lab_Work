<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown Timer</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
    }
    #display {
      font-size: 24px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Countdown Timer</h2>

  <input type="number" id="seconds" placeholder="Enter seconds">

  <br>
  <button onclick="startTimer()">Start</button>
  <button onclick="stopTimer()">Stop</button>

  <div id="display">0</div>

  <script>
    let interval;
    let timeLeft = 0;

    function startTimer() {
      const input = document.getElementById("seconds").value;
      timeLeft = parseInt(input);

      if (isNaN(timeLeft) || timeLeft <= 0) {
        alert("Enter a valid number!");
        return;
      }

      clearInterval(interval);

      updateDisplay();

      interval = setInterval(() => {
        timeLeft--;

        updateDisplay();

        if (timeLeft <= 0) {
          clearInterval(interval);
          document.getElementById("display").textContent = "⏰ Time Over!";
        }
      }, 1000);
    }

    function stopTimer() {
      clearInterval(interval);
    }

    function updateDisplay() {
      document.getElementById("display").textContent = timeLeft;
    }
  </script>

</body>
</html>
